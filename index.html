<!DOCTYPE html>
<html>
<head>
    <title>Student Helpdesk Chatbot</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
        }

        .chat-box {
            width: 420px;
            margin: 40px auto;
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            height: 520px;
        }

        .chat-header {
            text-align: center;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .chat-body {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .user {
            background: #dcf8c6;
            padding: 8px;
            margin: 6px 0;
            border-radius: 6px;
            text-align: right;
            max-width: 75%;
            margin-left: auto;
        }

        .bot {
            background: #e6f3ff;
            padding: 8px;
            margin: 6px 0;
            border-radius: 6px;
            max-width: 75%;
            margin-right: auto;
        }

        .input-area {
            margin-top: 10px;
            display: flex;
        }

        .input-area input {
            flex: 1;
            padding: 8px;
        }

        .input-area button {
            padding: 8px 12px;
        }

        .buttons {
            margin-top: 8px;
            text-align: center;
        }

        .buttons button {
            margin: 3px;
            padding: 6px 10px;
            border: none;
            border-radius: 6px;
            background: #4CAF50;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="chat-box">
    <div class="chat-header">🎓 Student Helpdesk Chatbot</div>

    <div class="chat-body" id="chatBody">
        {% for sender, message in chat_history %}
            {% if sender == "user" %}
                <div class="user">{{ message }}</div>
            {% else %}
                <div class="bot">{{ message }}</div>
            {% endif %}
        {% endfor %}
    </div>

    <form method="post" class="input-area">
        <input type="text" name="message" placeholder="Ask your question..." autofocus required>
        <button type="submit">Send</button>
    </form>

    <div class="buttons">
        <form method="post">
            <button name="message" value="courses">Courses</button>
            <button name="message" value="subjects">Subjects</button>
            <button name="message" value="exams">Exams</button>
            <button name="message" value="placements">Placements</button>
            <button name="message" value="study tips">Study Tips</button>
            <button name="message" value="contact">Contact</button>
        </form>
    </div>
</div>

<script>
    const chatBody = document.getElementById("chatBody");
    chatBody.scrollTop = chatBody.scrollHeight;
</script>

</body>
</html>
